spring.application.name=ia-management-system
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ia_management_nodejs?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Praveen@2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwtSecret=SecretKeyToGenJWTsExpiresIn10HoursSoMakeItLongEnoughSecretKeyToGenJWTsExpiresIn10HoursSoMakeItLongEnoughSecretKeyToGenJWTsExpiresIn10HoursSoMakeItLongEnough
app.jwtExpirationMs=36000000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/questions

# Mail Configuration (Update these with your real credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
